name: ReSpec Test

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_EXECUTABLE_PATH: "/usr/bin/google-chrome"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install respec

      - name: Build site
        run: |
          npx respec -s index.html -o out.html --localhost --verbose --timeout 100
